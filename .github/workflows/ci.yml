name: CI
on:
  push: { branches: [main, master] }
  pull_request: { branches: [main, master] }

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bash 5 (macOS — default bash 3.2 is too old)
        if: matrix.os == 'macos-latest'
        run: brew install bash
      - name: Smoke tests
        run: bash tests/test_gh-portfolio.sh
      - name: Install shellcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: Install shellcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck
      - name: Shellcheck
        run: shellcheck -x --source-path=lib bin/gh-portfolio lib/*.sh install.sh tests/*.sh
